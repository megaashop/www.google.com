name: Auto_Update_Subs

on:
  push:
    paths:
      - "subs/Ozime/**"
  workflow_dispatch:

jobs:
  copy-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Ozime content
        run: |
          echo "Start..."

          for dir in subs/*/; do
            if [ "$dir" != "subs/Ozime/" ]; then
              
              mkdir -p "$dir"
              
              rm -rf "${dir:?}"*
              
              cp -r subs/Ozime/. "$dir" 2>/dev/null || true
              
              echo "Updated $dir"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update from Ozime"
            git push origin HEAD:main
          fi
